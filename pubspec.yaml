name: smart_grocery_assistant
description: Personal Tamil-first grocery price comparison assistant.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Screen recording (Android MediaProjection wrapper)
  flutter_screen_recording: ^2.0.2

  # Video -> frame extraction for OCR sampling
  video_thumbnail: ^0.5.3

  # On-device OCR
  google_mlkit_text_recognition: ^0.13.0

  # State management
  provider: ^6.1.2

  # Permissions (screen record / notifications)
  permission_handler: ^11.3.1

  # Local notifications (offer-expiry / price-drop alerts)
  flutter_local_notifications: ^17.2.2

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
